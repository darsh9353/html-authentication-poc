<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <!-- Google Fonts: Inter -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="styles.css">
         
    </head>
    <body>

        <div class="container d-flex align-items-center justify-content-center min-vh-100">
          <div class="card p-4 shadow-lg" style="max-width: 400px; width: 100%;">
            <div class="card-body">
              <h2 class="card-title text-center mb-4 fw-bold">Login</h2>
              <form>
                <div class="mb-3">
                  <label for="username" class="form-label">Username</label>
                  <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label for="pass" class="form-label">Password</label>
                  <input type="password" name="password" id="pass" class="form-control" required>
                </div>
                <div class="d-grid mb-3">
                  <a href="dashboard.html" class="btn btn-primary btn-lg">Login</a>
                </div>
                <div class="d-flex justify-content-between">
                  <a href="forgot-password.html" class="link-primary">Forgot Password?</a>
                  <a href="register.html" class="link-secondary">Create new Account</a>
                </div>
              </form>
            </div>
          </div>
        </div>
        
        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
