<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <br>

        <div class="container d-flex align-items-center justify-content-center min-vh-100">
          <div class="card p-4 shadow-lg" style="max-width: 500px; width: 100%;">
            <div class="card-body">
              <h2 class="card-title text-center mb-4 fw-bold">Register</h2>
              <form>
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input type="text" id="name" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" name="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label for="phno" class="form-label">Phone Number</label>
                  <input type="tel" name="phno" id="phno" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label for="pass" class="form-label">Password</label>
                  <input type="password" name="password" id="pass" class="form-control" required>
                </div>
                <div class="mb-4">
                  <label for="cpass" class="form-label">Confirm Password</label>
                  <input type="password" id="cpass" name="confirm-password" class="form-control" required>
                </div>
                <div class="d-grid mb-3">
                  <a href="index.html" class="btn btn-success btn-lg">Register</a>
                </div>
                <div class="text-center">
                  <a href="index.html" class="link-secondary">I already have an account</a>
                </div>
              </form>
            </div>
          </div>
        </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
