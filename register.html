
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <br>

        <div id="h1div">
        <h1 id="h1reg">Register</h1>
        </div>
        <br>
    <div id="registerpage">
        <form >

            <div>
            <label for="name">Name :</label>
            <input type="text" id="name" name="name" class="in3" required>
            </div>

            <br>
            <br>
            <div>
            <label for="email">Email :</label>
            <input type="email" name="email" id="email"  class="in3" required>
            </div>
            <br>
            <br>
           
            <div>
            <label for="phno">Phone Number :</label>
            <input type="tel" name="phno" id="phno"  class="in3" required>
            </div>

            <br>
            <br>
            
            
            <div>
            <label for="pass">Password :</label>
            <input type="password" name="password" id="pass"  class="in3" required>
            </div>

            <br>
            <br>

          
            <div>
            <label for="cpass">Confirm Password :</label>
            <input type="password" id="cpass" name="confirm-password"  class="in3" required>
            </div>

            <br>
            <br>
            <br>
            
            <a href="login.html">
            <input type="button" value="Register" id="reg">
            </a>
            <br>
            <br>

            <a href="login.html">I already have an account</a>

        </form>

    </div>


    
</body>
</html>
